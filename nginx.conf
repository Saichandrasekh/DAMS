# DAMS production Nginx config
#
# Active copy lives at D:\nginx\conf\nginx.conf.
# This file is the source of truth — sync changes with:
#     Copy-Item d:\attendence\nginx.conf D:\nginx\conf\nginx.conf -Force
#     D:\nginx\nginx.exe -t
#     D:\nginx\nginx.exe -s reload

worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ─── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    upstream dams_backend {
        server 127.0.0.1:5000;
        keepalive 32;
    }

    server {
        listen       80;
        server_name  attend.kautech.co.in localhost;

        real_ip_header  X-Forwarded-For;
        set_real_ip_from 127.0.0.1;

        client_max_body_size 10M;

        # ─── 1) API → Flask/Waitress ──────────────────────────────────
        location /api/ {
            proxy_pass         http://dams_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 120s;
            proxy_buffering    off;
        }

        # ─── 2) Legacy HTML opt-in path ───────────────────────────────
        # The React SPA now owns /login /dashboard /admin/* etc.
        # To reach the legacy Flask templates, prefix with /legacy/
        #   e.g. /legacy/admin/students  →  Flask renders admin/students.html
        location /legacy/ {
            rewrite ^/legacy/(.*)$ /$1 break;
            proxy_pass         http://dams_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ─── 3) Flask static (legacy CSS/JS, uploads) ─────────────────
        location /static/ {
            alias d:/attendence/backend/static/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            access_log off;
        }

        # ─── 4) React SPA — everything else ───────────────────────────
        root  d:/attendence/frontend/dist;
        index index.html;

        # Hashed bundle assets — cache forever
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
            try_files $uri =404;
        }

        # SPA fallback for client-side routing
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
