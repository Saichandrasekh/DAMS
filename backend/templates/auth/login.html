{% extends "base.html" %}

{% block title %}Login - DAMS{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="text-center mb-6">
            <div
                style="width: 64px; height: 64px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto;">
                <i class="fas fa-user-check fa-lg" style="color: white;"></i>
            </div>
            <h1 style="margin-top: 20px; font-size: 1.5rem;">Welcome Back</h1>
            <p class="text-muted text-sm" style="margin-top: 4px;">Sign in to Digital Attendance Management System</p>
        </div>

        <form action="{{ url_for('auth.login') }}" method="POST" id="login-form">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="name@school.com" required
                    autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" class="form-control"
                        placeholder="Enter your password" required autocomplete="current-password">
                    <button type="button" id="toggle-password"
                        style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px;">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-full" style="margin-top: 8px;">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div class="text-center mt-6">
            <p class="text-muted text-xs">Forgot password? Contact your school administrator</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Password toggle
    const toggleBtn = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('password');
    if (toggleBtn && passwordInput) {
        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            toggleBtn.querySelector('i').className = type === 'password' ? 'far fa-eye' : 'far fa-eye-slash';
        });
    }
</script>
{% endblock %}
