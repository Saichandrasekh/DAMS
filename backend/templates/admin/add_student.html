{% extends "dashboard_layout.html" %}

{% block page_title %}Add New Student{% endblock %}

{% block sidebar_nav %}
{% include 'admin/_sidebar.html' %}
{% endblock %}

{% block dashboard_content %}
<div style="max-width: 800px; margin: 0 auto;">
    <form action="{{ url_for('admin.add_student') }}" method="POST">
        <div class="card mb-6">
            <h3 class="mb-4">Personal Details</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label style="display:block; font-size:0.875rem; margin-bottom:4px;">Full Name *</label>
                    <input type="text" name="name" classcard"
                        style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px;" required>
                </div>
                <div>
                    <label style="display:block; font-size:0.875rem; margin-bottom:4px;">Email Address *</label>
                    <input type="email" name="email" classcard"
                        style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px;" required>
                </div>
                <div>
                    <label style="display:block; font-size:0.875rem; margin-bottom:4px;">Phone Number</label>
                    <input type="text" name="phone" classcard"
                        style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px;">
                </div>
                <div>
                    <label style="display:block; font-size:0.875rem; margin-bottom:4px;">Password (default) *</label>
                    <input type="text" name="password" value="Student@123" classcard"
                        style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px;" required>
                </div>
                <div>
                    <label style="display:block; font-size:0.875rem; margin-bottom:4px;">Gender</label>
                    <select name="gender" classcard"
                        style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px;">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label style="display:block; font-size:0.875rem; margin-bottom:4px;">Date of Birth</label>
                    <input type="date" name="dob" classcard"
                        style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px;">
                </div>
            </div>
        </div>

        <div class="card mb-6">
            <h3 class="mb-4">Academic Details</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label style="display:block; font-size:0.875rem; margin-bottom:4px;">Assign Class *</label>
                    <select name="class_id" classcard"
                        style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px;" required>
                        <option value="">Select a Class</option>
                        {% for c in classes %}
                        <option value="{{ c.id }}">{{ c.name }} - {{ c.section }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label style="display:block; font-size:0.875rem; margin-bottom:4px;">Roll Number</label>
                    <input type="text" name="roll_no" classcard"
                        style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px;">
                </div>
            </div>
        </div>

        <div class="flex gap-4">
            <button type="submit" class="btn btn-primary" style="padding:12px 32px;">Save Student</button>
            <a href="{{ url_for('admin.students') }}" class="btn" style="border: 1px solid var(--border);">Back to
                List</a>
        </div>
    </form>
</div>
{% endblock %}
